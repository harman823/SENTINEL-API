openapi: 3.0.3
info:
  title: AutoAPI Full Test API
  description: >
    A comprehensive mock API specification designed to fully exercise the
    AutoAPI Intelligence pipeline — risk scoring, policy evaluation, approval
    gating, test generation, execution simulation, and report generation.
  version: 2.0.0
  contact:
    name: AutoAPI Team
    email: team@autoapi.dev

servers:
  - url: https://api.example.com/v2
    description: Production
  - url: https://staging-api.example.com/v2
    description: Staging

# ────────────────────────────────────────
# Security Schemes
# ────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    # ── Core Resources ──
    User:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          minLength: 3
          maxLength: 64
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        role:
          type: string
          enum: [user, moderator, admin, superuser]
          example: user
        profile:
          $ref: '#/components/schemas/UserProfile'
        created_at:
          type: string
          format: date-time

    UserProfile:
      type: object
      properties:
        bio:
          type: string
          maxLength: 500
        avatar_url:
          type: string
          format: uri
        settings:
          type: object
          properties:
            theme:
              type: string
              enum: [light, dark, system]
            notifications_enabled:
              type: boolean
            language:
              type: string

    CreateUserRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          type: string
          enum: [user, moderator, admin]
          default: user

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, moderator, admin]

    Product:
      type: object
      required: [id, name, price, category]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
          minimum: 0
        category:
          type: string
          enum: [electronics, clothing, food, books, other]
        tags:
          type: array
          items:
            type: string
        in_stock:
          type: boolean
        metadata:
          type: object
          additionalProperties:
            type: string

    CreateProductRequest:
      type: object
      required: [name, price, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
          minimum: 0
        category:
          type: string
          enum: [electronics, clothing, food, books, other]
        tags:
          type: array
          items:
            type: string

    Order:
      type: object
      required: [id, user_id, items, status, total]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled, refunded]
        total:
          type: number
          format: double
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    OrderItem:
      type: object
      required: [product_id, quantity, unit_price]
      properties:
        product_id:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: double

    CreateOrderRequest:
      type: object
      required: [user_id, items]
      properties:
        user_id:
          type: integer
          format: int64
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: integer
              quantity:
                type: integer
                minimum: 1
        notes:
          type: string

    # ── Auth / Token Schemas ──
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer

    PasswordChangeRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 8

    # ── Utility Schemas ──
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
        version:
          type: string
        uptime_seconds:
          type: integer
        checks:
          type: object
          properties:
            database:
              type: string
              enum: [ok, error]
            cache:
              type: string
              enum: [ok, error]

    AdminConfig:
      type: object
      properties:
        maintenance_mode:
          type: boolean
        rate_limit:
          type: integer
        allowed_origins:
          type: array
          items:
            type: string
        secret_rotation_days:
          type: integer

# ────────────────────────────────────────
# Global security
# ────────────────────────────────────────
security:
  - BearerAuth: []

# ────────────────────────────────────────
# Paths
# ────────────────────────────────────────
paths:

  # ── Health (safe GET, no operationId → triggers policy) ──
  /health:
    get:
      summary: Health check
      description: Returns the health status of the API. No auth required.
      tags: [System]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  # ── Auth / Token endpoints (high-risk keywords) ──
  /auth/login:
    post:
      summary: Authenticate user
      operationId: loginUser
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/token/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password/change:
    put:
      summary: Change user password
      description: Destructive PUT on a high-risk 'password' path — should trigger both destructive_method and high_risk_score policies.
      operationId: changePassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: Password changed successfully
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Users (full CRUD) ──
  /users:
    get:
      summary: List all users
      operationId: listUsers
      tags: [Users]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: role
          in: query
          description: Filter by user role
          schema:
            type: string
            enum: [user, moderator, admin, superuser]
        - name: search
          in: query
          description: Search by username or email
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

    post:
      summary: Create a new user
      operationId: createUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}:
    get:
      summary: Get user by ID
      operationId: getUserById
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Replace user entirely
      description: Full replacement — destructive PUT, triggers policy.
      operationId: replaceUser
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: User replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Partially update user
      description: Partial update — destructive PATCH, triggers policy.
      operationId: updateUser
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a user
      description: Destructive DELETE — highest risk method, triggers policy.
      operationId: deleteUser
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Products (mixed risk) ──
  /products:
    get:
      summary: List products
      operationId: listProducts
      tags: [Products]
      security: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [electronics, clothing, food, books, other]
        - name: min_price
          in: query
          schema:
            type: number
            format: double
        - name: max_price
          in: query
          schema:
            type: number
            format: double
        - name: in_stock
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, price, created_at]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

    post:
      summary: Create a product
      operationId: createProduct
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products/{productId}:
    get:
      summary: Get product details
      operationId: getProductById
      tags: [Products]
      security: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update product details
      operationId: updateProduct
      tags: [Products]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    delete:
      summary: Remove a product
      operationId: deleteProduct
      tags: [Products]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Orders (nested schemas, mixed methods) ──
  /orders:
    get:
      summary: List orders
      operationId: listOrders
      tags: [Orders]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, shipped, delivered, cancelled, refunded]
        - name: user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

    post:
      summary: Place a new order
      operationId: createOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders/{orderId}:
    get:
      summary: Get order details
      operationId: getOrderById
      tags: [Orders]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update order status
      operationId: updateOrderStatus
      tags: [Orders]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [confirmed, shipped, delivered, cancelled]
                notes:
                  type: string
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

    delete:
      summary: Cancel and remove an order
      operationId: deleteOrder
      tags: [Orders]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order cancelled and removed
        '403':
          description: Order cannot be cancelled in current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Admin endpoints (high-risk keyword "admin" in path) ──
  /admin/config:
    get:
      summary: Get system configuration
      operationId: getAdminConfig
      tags: [Admin]
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConfig'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update system configuration
      description: >
        PUT on /admin path — triggers both destructive_method and high_risk_score
        policies (admin keyword + destructive method = score >= 0.5).
      operationId: updateAdminConfig
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminConfig'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConfig'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/users/{userId}/role:
    put:
      summary: Change a user's role (admin action)
      description: >
        Admin-level role change. High risk due to admin path + destructive method.
      operationId: changeUserRole
      tags: [Admin]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, moderator, admin, superuser]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Secret key management (high-risk keywords: secret + key) ──
  /admin/secret-keys:
    get:
      summary: List API secret keys
      operationId: listSecretKeys
      tags: [Admin]
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: List of API keys (masked)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    prefix:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    active:
                      type: boolean

    post:
      summary: Generate a new secret key
      operationId: createSecretKey
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                expires_in_days:
                  type: integer
                  default: 90
      responses:
        '201':
          description: New key generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  key:
                    type: string
                    description: Full key — shown only once
                  expires_at:
                    type: string
                    format: date-time

  /admin/secret-keys/{keyId}:
    delete:
      summary: Revoke a secret key
      description: >
        DELETE on /admin/secret-keys — maximum risk: admin + secret + key keywords
        combined with DELETE method. Should produce risk score near 1.0.
      operationId: revokeSecretKey
      tags: [Admin]
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Key revoked
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Endpoint with NO operationId (triggers no_operation_id policy) ──
  /reports/daily:
    get:
      summary: Get daily analytics report
      description: >
        This endpoint intentionally lacks an operationId to trigger the
        no_operation_id policy rule and demonstrate traceability warnings.
      tags: [Reports]
      parameters:
        - name: date
          in: query
          description: Report date (YYYY-MM-DD)
          required: true
          schema:
            type: string
            format: date
        - name: X-Request-ID
          in: header
          description: Optional request tracing header
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Daily report
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  total_requests:
                    type: integer
                  error_rate:
                    type: number
                    format: double
                  top_endpoints:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        count:
                          type: integer
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Another no-operationId endpoint with DELETE (double policy violation) ──
  /reports/cache:
    delete:
      summary: Clear report cache
      description: >
        No operationId + DELETE method = triggers both no_operation_id and
        destructive_method policies simultaneously.
      tags: [Reports]
      responses:
        '204':
          description: Cache cleared
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── File upload with multipart (edge case) ──
  /products/{productId}/images:
    post:
      summary: Upload product image
      operationId: uploadProductImage
      tags: [Products]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                alt_text:
                  type: string
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_id:
                    type: string
                  url:
                    type: string
                    format: uri
        '400':
          description: Invalid image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Bulk operations (complex request body) ──
  /products/bulk:
    post:
      summary: Bulk create products
      operationId: bulkCreateProducts
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [products]
              properties:
                products:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/CreateProductRequest'
                skip_validation:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Products created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                  failed:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        error:
                          type: string

    delete:
      summary: Bulk delete products
      description: Destructive bulk operation — high risk.
      operationId: bulkDeleteProducts
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_ids]
              properties:
                product_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  not_found:
                    type: array
                    items:
                      type: integer
