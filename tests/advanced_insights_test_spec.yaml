openapi: 3.0.0
info:
  title: SENTINEL Error Test Spec
  version: 0.1-broken

paths:
  /admin/users:
    delete:
      summary: Bulk delete all users
      operationId: bulkDeleteUsers
      responses:
        "204":
          description: All users deleted

    post:
      operationId: createAdminUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - role
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: password123
                role:
                  type: string
                  enum:
                    - admin
                    - superuser
                    - root
      responses:
        "201":
          description: Admin created

  /auth/token:
    post:
      operationId: issueAuthToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                api_key:
                  type: string
                secret:
                  type: string
      responses:
        "200":
          description: Token issued

  /internal/config:
    put:
      operationId: updateSystemConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                debug_mode:
                  type: boolean
                db_connection_string:
                  type: string
                private_key:
                  type: string
                credentials:
                  type: object
      responses:
        "200":
          description: Config updated

  /users/{id}/settings:
    patch:
      operationId: updateUserSettings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                phone:
                  type: string
                ssn:
                  type: string
                credit_card:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                address:
                  type: string
      responses:
        "200":
          description: Settings updated

  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: OK

  /data/export:
    get:
      operationId: exportAllData
      summary: Export all user data
      responses:
        "200":
          description: Data export
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        email:
                          type: string
                        ssn:
                          type: string
                        credit_card:
                          type: string
